<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 PROTECT PAGE -->
<script>
  let user = JSON.parse(localStorage.getItem("currentUser"));
  if (!user) {
    window.location.href = "login.html";
  }
</script>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>STACKLY</h2>

    <a class="active">Dashboard</a>
    <a href="404.html">Projects</a>
    <a href="404.html">Analytics</a>
    <a href="404.html">Team</a>
    <a href="404.html">Settings</a>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- TOPBAR -->
    <div class="topbar">

      <!-- SEARCH -->
      <input type="text" placeholder="Search projects...">

      <!-- 👇 UPDATED USER PROFILE -->
      <div class="profile">
        <div class="user-text">
          <span id="userName"></span>
          <small id="userRole"></small>
        </div>
        <img src="https://i.pravatar.cc/40" alt="user">
      </div>

    </div>

    <h1>Overview Dashboard</h1>

    <!-- CARDS -->
    <div class="dashboard-cards">

      <div class="dashboard-card">
        <h3>Total Projects</h3>
        <h1>24</h1>
        <p class="green">↑ 12% from last month</p>
      </div>

      <div class="dashboard-card">
        <h3>Active Tasks</h3>
        <h1>145</h1>
        <p class="red">↓ 5% from last month</p>
      </div>

      <div class="dashboard-card">
        <h3>Team Members</h3>
        <h1>48</h1>
        <p class="green">↑ 2 new this week</p>
      </div>

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
